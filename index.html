<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0c0a1f" />
  <title>Lucy's Rainbow Rewards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Animated gradient mesh background -->
  <div class="mesh" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="orb orb-4"></span>
  </div>

  <!-- Reward popup: pot of gold pops in the top-left when Lucy finishes -->
  <div id="reward-popup" class="reward-popup" role="status" aria-live="polite" aria-hidden="true">
    <svg viewBox="-50 -40 100 90" width="120" height="108" aria-label="Pot of gold">
      <defs>
        <linearGradient id="rp-pot-body" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#3a2a4f" />
          <stop offset="40%" stop-color="#1a0f2e" />
          <stop offset="100%" stop-color="#0a0518" />
        </linearGradient>
        <linearGradient id="rp-pot-rim" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5a4670" />
          <stop offset="100%" stop-color="#2a1a3e" />
        </linearGradient>
        <radialGradient id="rp-coin-shine" cx="0.35" cy="0.3" r="0.7">
          <stop offset="0%" stop-color="#fff7c0" />
          <stop offset="40%" stop-color="#ffd76b" />
          <stop offset="100%" stop-color="#b8800a" />
        </radialGradient>
        <linearGradient id="rp-coin-edge" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe97a" />
          <stop offset="100%" stop-color="#a87200" />
        </linearGradient>
        <filter id="rp-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2.5" />
        </filter>
      </defs>
      <ellipse cx="0" cy="18" rx="42" ry="10" fill="#ffd76b" opacity="0.4" filter="url(#rp-glow)" />
      <path d="M -28 -2 Q -34 24 -20 34 L 20 34 Q 34 24 28 -2 Z"
            fill="url(#rp-pot-body)" stroke="#000" stroke-opacity="0.6" stroke-width="0.8" />
      <path d="M -24 2 Q -28 22 -20 30" fill="none"
            stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round" />
      <ellipse cx="0" cy="-2" rx="26" ry="6" fill="url(#rp-coin-shine)" />
      <ellipse cx="0" cy="-4" rx="28" ry="6" fill="url(#rp-pot-rim)" stroke="#000" stroke-opacity="0.5" stroke-width="0.8" />
      <ellipse cx="0" cy="-4" rx="24" ry="3.5" fill="#0a0518" />
      <g>
        <circle cx="-16" cy="-10" r="6.5" fill="url(#rp-coin-shine)" stroke="url(#rp-coin-edge)" stroke-width="1" />
        <circle cx="-2"  cy="-14" r="7.5" fill="url(#rp-coin-shine)" stroke="url(#rp-coin-edge)" stroke-width="1" />
        <circle cx="14"  cy="-9"  r="6.5" fill="url(#rp-coin-shine)" stroke="url(#rp-coin-edge)" stroke-width="1" />
        <circle cx="-9"  cy="-6"  r="5"   fill="url(#rp-coin-shine)" stroke="url(#rp-coin-edge)" stroke-width="1" />
        <circle cx="7"   cy="-6"  r="5"   fill="url(#rp-coin-shine)" stroke="url(#rp-coin-edge)" stroke-width="1" />
      </g>
      <g fill="#fff7c0">
        <path class="rp-sparkle s1" d="M -28 -22 l 1.5 4 l 4 1.5 l -4 1.5 l -1.5 4 l -1.5 -4 l -4 -1.5 l 4 -1.5 z" />
        <path class="rp-sparkle s2" d="M 24 -24 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 l 3 -1 z" />
        <path class="rp-sparkle s3" d="M 0 -32 l 1.2 3 l 3 1.2 l -3 1.2 l -1.2 3 l -1.2 -3 l -3 -1.2 l 3 -1.2 z" />
      </g>
    </svg>
    <div class="reward-text">
      <span class="reward-eyebrow">Reward!</span>
      <span class="reward-headline">Pot of gold</span>
    </div>
  </div>

  <main class="app">
    <header class="header">
      <p class="eyebrow">Today's Quest</p>
      <h1 class="title">Lucy's Rainbow</h1>
    </header>

    <section class="card rainbow-stage">
      <svg
        id="rainbow"
        viewBox="0 0 400 260"
        preserveAspectRatio="xMidYMid meet"
        aria-label="Rainbow path with seven checkpoints"
      >
        <defs>
          <!-- Soft glow filter -->
          <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <filter id="pot-glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feFlood flood-color="#ffd76b" flood-opacity="0.8" result="colour" />
            <feComposite in="colour" in2="blur" operator="in" result="glow" />
            <feMerge>
              <feMergeNode in="glow" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <!-- Gradients for the pot -->
          <linearGradient id="pot-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3a2a4f" />
            <stop offset="40%" stop-color="#1a0f2e" />
            <stop offset="100%" stop-color="#0a0518" />
          </linearGradient>
          <linearGradient id="pot-rim" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#5a4670" />
            <stop offset="100%" stop-color="#2a1a3e" />
          </linearGradient>
          <radialGradient id="coin-shine" cx="0.35" cy="0.3" r="0.7">
            <stop offset="0%" stop-color="#fff7c0" />
            <stop offset="40%" stop-color="#ffd76b" />
            <stop offset="100%" stop-color="#b8800a" />
          </radialGradient>
          <linearGradient id="coin-edge" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe97a" />
            <stop offset="100%" stop-color="#a87200" />
          </linearGradient>

          <!-- Avatar clip -->
          <clipPath id="avatar-clip">
            <circle cx="0" cy="0" r="22" />
          </clipPath>

          <!-- Checkpoint gradient -->
          <radialGradient id="dot-reached" cx="0.3" cy="0.3" r="0.8">
            <stop offset="0%" stop-color="#fff7c0" />
            <stop offset="60%" stop-color="#ffd76b" />
            <stop offset="100%" stop-color="#d99a00" />
          </radialGradient>
        </defs>

        <!-- Rainbow arc bands (ROYGBIV) with soft glow -->
        <g class="bands" fill="none" stroke-linecap="round" filter="url(#soft-glow)">
          <path d="M 40 220 A 160 160 0 0 1 360 220" stroke="#ff5b6e" stroke-width="13" />
          <path d="M 54 220 A 146 146 0 0 1 346 220" stroke="#ffa552" stroke-width="13" />
          <path d="M 68 220 A 132 132 0 0 1 332 220" stroke="#ffd86b" stroke-width="13" />
          <path d="M 82 220 A 118 118 0 0 1 318 220" stroke="#6ee7a8" stroke-width="13" />
          <path d="M 96 220 A 104 104 0 0 1 304 220" stroke="#5ab8ff" stroke-width="13" />
          <path d="M 110 220 A 90 90 0 0 1 290 220" stroke="#8a7dff" stroke-width="13" />
          <path d="M 124 220 A 76 76 0 0 1 276 220" stroke="#c77dff" stroke-width="13" />
        </g>

        <!-- Invisible centre path for placing checkpoints/avatar -->
        <path
          id="center-path"
          d="M 30 220 A 170 170 0 0 1 370 220"
          fill="none"
          stroke="none"
        />

        <!-- Checkpoints -->
        <g id="checkpoints"></g>

        <!-- Avatar -->
        <g id="avatar" class="avatar">
          <circle class="avatar-glow" cx="0" cy="0" r="28" />
          <circle class="avatar-ring" cx="0" cy="0" r="24" />
          <image
            id="avatar-image"
            href="assets/lucy2.png"
            x="-22" y="-22" width="44" height="44"
            clip-path="url(#avatar-clip)"
            preserveAspectRatio="xMidYMid slice"
          />
          <text id="avatar-fallback" x="0" y="2" text-anchor="middle" dominant-baseline="central" font-size="26" style="display: none;">🦄</text>
        </g>
      </svg>

      <!-- Confetti overlay -->
      <div id="confetti" class="confetti" aria-hidden="true"></div>
    </section>

    <section class="progress-card card">
      <div class="progress-row">
        <span class="progress-label">Progress</span>
        <span class="progress-count" id="progress">0 / 7</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <div class="buttons">
      <button id="done-btn" class="btn btn-primary" type="button">
        <span class="btn-label">Chore done</span>
        <span class="btn-icon">✨</span>
      </button>
      <button id="reset-btn" class="btn btn-secondary" type="button">
        Reset
      </button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en-AU" data-theme="morning">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#f5ecdf" />
  <title>Lucy's Rainbow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles-v2.css" />
</head>
<body>
  <!-- Atmospheric backdrop. Layers swap per theme via CSS. -->
  <div class="sky" aria-hidden="true">
    <div class="sky-grad"></div>
    <div class="sky-stars"></div>
    <div class="sky-cloud sky-cloud-1"></div>
    <div class="sky-cloud sky-cloud-2"></div>
    <div class="sky-cloud sky-cloud-3"></div>
    <div class="sky-vignette"></div>
  </div>

  <main class="app">
    <!-- Top bar: brand mark + meta -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28">
            <defs>
              <linearGradient id="brand-rb" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stop-color="#c77dff"/>
                <stop offset="20%" stop-color="#8a7dff"/>
                <stop offset="40%" stop-color="#5ab8ff"/>
                <stop offset="60%" stop-color="#6ee7a8"/>
                <stop offset="80%" stop-color="#ffd86b"/>
                <stop offset="100%" stop-color="#ff7aa2"/>
              </linearGradient>
            </defs>
            <path d="M 4 26 A 12 12 0 0 1 28 26" fill="none" stroke="url(#brand-rb)" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="16" cy="26" r="1.8" fill="currentColor"/>
          </svg>
        </span>
        <div class="brand-text">
          <span class="brand-name">Lucy's Rainbow</span>
          <span class="brand-sub" id="brand-date">—</span>
        </div>
      </div>
      <div class="streak-chip" id="streak-chip" title="Current streak">
        <span class="streak-flame" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 1.5c.6 2.2 2.5 3 3 5.5.4 2-.6 4-2.2 4.7.3-.6.5-1.5-.1-2.3-.7-1-1.4-.5-2-1.8-.5-1 .1-2.3 1.3-3.1-.4 1 .1 1.8.5 2.2.4-1.6-1.1-2.6-.5-5.2zM5.4 8.4C5 9 4.5 10 4.6 11c.1 1.3 1 2.3 1.8 2.8-.7-1-.5-1.8.1-2.5.2.4.4 1 1 1 .6 0 .9-.4 1-1 .5 1 .1 2-.6 2.7 1.5-.3 2.7-1.8 2.6-3.6-.1-1.5-1.2-2.3-1.6-3.3-.3.8-.6 1.2-1.2 1.7-.6-.6-.6-1.4-.3-2.1-.6.1-1.7 1.1-2 2.7z" fill="currentColor"/></svg>
        </span>
        <span class="streak-num" id="streak-num">0</span>
        <span class="streak-label">week streak</span>
      </div>
    </header>

    <!-- HERO: rainbow stage -->
    <section class="stage card">
      <div class="stage-meta">
        <span class="stage-eyebrow">Today's quest</span>
        <h1 class="stage-title">Reach the pot of gold</h1>
      </div>

      <svg
        id="rainbow"
        viewBox="-25 -30 450 320"
        preserveAspectRatio="xMidYMid meet"
        aria-label="Rainbow path with seven daily checkpoints and a pot of gold"
      >
        <defs>
          <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <filter id="avatar-shadow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
            <feOffset dx="0" dy="3" />
            <feComponentTransfer><feFuncA type="linear" slope="0.35" /></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <linearGradient id="pot-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a3360" />
            <stop offset="55%" stop-color="#2a1a3e" />
            <stop offset="100%" stop-color="#15091f" />
          </linearGradient>
          <linearGradient id="pot-rim" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#6a557e" />
            <stop offset="100%" stop-color="#2a1a3e" />
          </linearGradient>
          <radialGradient id="coin-shine" cx="0.35" cy="0.3" r="0.7">
            <stop offset="0%" stop-color="#fff7c0" />
            <stop offset="40%" stop-color="#ffd76b" />
            <stop offset="100%" stop-color="#b8800a" />
          </radialGradient>
          <linearGradient id="coin-edge" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe97a" />
            <stop offset="100%" stop-color="#a87200" />
          </linearGradient>

          <clipPath id="avatar-clip">
            <circle cx="0" cy="0" r="38" />
          </clipPath>

          <radialGradient id="dot-reached" cx="0.3" cy="0.3" r="0.8">
            <stop offset="0%" stop-color="#fff7c0" />
            <stop offset="55%" stop-color="#ffd86b" />
            <stop offset="100%" stop-color="#d99a00" />
          </radialGradient>

          <!-- Per-band gradients for soft inner-to-outer tone -->
          <linearGradient id="band-1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ff8da0"/><stop offset="100%" stop-color="#ff5b6e"/></linearGradient>
          <linearGradient id="band-2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffc290"/><stop offset="100%" stop-color="#ffa552"/></linearGradient>
          <linearGradient id="band-3" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#ffe69a"/><stop offset="100%" stop-color="#ffd86b"/></linearGradient>
          <linearGradient id="band-4" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#a4f0c5"/><stop offset="100%" stop-color="#6ee7a8"/></linearGradient>
          <linearGradient id="band-5" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#9bd3ff"/><stop offset="100%" stop-color="#5ab8ff"/></linearGradient>
          <linearGradient id="band-6" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#b9b1ff"/><stop offset="100%" stop-color="#8a7dff"/></linearGradient>
          <linearGradient id="band-7" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#dcaaff"/><stop offset="100%" stop-color="#c77dff"/></linearGradient>
        </defs>

        <!-- Rainbow arc bands (ROYGBIV). Soft, refined; only the active position glows. -->
        <g class="bands" fill="none" stroke-linecap="round">
          <path d="M 40 220 A 160 160 0 0 1 360 220" stroke="url(#band-1)" stroke-width="13" />
          <path d="M 54 220 A 146 146 0 0 1 346 220" stroke="url(#band-2)" stroke-width="13" />
          <path d="M 68 220 A 132 132 0 0 1 332 220" stroke="url(#band-3)" stroke-width="13" />
          <path d="M 82 220 A 118 118 0 0 1 318 220" stroke="url(#band-4)" stroke-width="13" />
          <path d="M 96 220 A 104 104 0 0 1 304 220" stroke="url(#band-5)" stroke-width="13" />
          <path d="M 110 220 A 90 90 0 0 1 290 220" stroke="url(#band-6)" stroke-width="13" />
          <path d="M 124 220 A 76 76 0 0 1 276 220" stroke="url(#band-7)" stroke-width="13" />
        </g>

        <!-- Ground line under the rainbow ends -->
        <line class="ground" x1="-30" y1="222" x2="430" y2="222" />

        <!-- Invisible centre path for placing checkpoints/avatar -->
        <path id="center-path" d="M 30 220 A 170 170 0 0 1 370 220" fill="none" stroke="none" />

        <!-- Checkpoints (drawn over bands so they read) -->
        <g id="checkpoints"></g>

        <!-- Pot of gold -->
        <g id="pot-anchor">
          <g id="pot" class="pot">
            <ellipse cx="0" cy="14" rx="38" ry="11" class="pot-shadow" />
            <path
              d="M -28 -2 Q -34 24 -20 34 L 20 34 Q 34 24 28 -2 Z"
              fill="url(#pot-body)" stroke="#000" stroke-opacity="0.55" stroke-width="0.8"
            />
            <path
              d="M -24 2 Q -28 22 -20 30"
              fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"
            />
            <ellipse cx="0" cy="-2" rx="26" ry="6" fill="url(#coin-shine)" />
            <ellipse cx="0" cy="-4" rx="28" ry="6" fill="url(#pot-rim)" stroke="#000" stroke-opacity="0.5" stroke-width="0.8" />
            <ellipse cx="0" cy="-4" rx="24" ry="3.5" fill="#0a0518" />
            <g filter="url(#soft-glow)">
              <circle cx="-16" cy="-10" r="6.5" fill="url(#coin-shine)" stroke="url(#coin-edge)" stroke-width="1" />
              <circle cx="-2"  cy="-14" r="7.5" fill="url(#coin-shine)" stroke="url(#coin-edge)" stroke-width="1" />
              <circle cx="14"  cy="-9"  r="6.5" fill="url(#coin-shine)" stroke="url(#coin-edge)" stroke-width="1" />
              <circle cx="-9"  cy="-6"  r="5"   fill="url(#coin-shine)" stroke="url(#coin-edge)" stroke-width="1" />
              <circle cx="7"   cy="-6"  r="5"   fill="url(#coin-shine)" stroke="url(#coin-edge)" stroke-width="1" />
            </g>
            <g class="sparkles" fill="#fff7c0">
              <path class="sparkle s1" d="M -22 -22 l 1.5 4 l 4 1.5 l -4 1.5 l -1.5 4 l -1.5 -4 l -4 -1.5 l 4 -1.5 z" />
              <path class="sparkle s2" d="M 20 -24 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 l 3 -1 z" />
              <path class="sparkle s3" d="M 0 -28 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 l 3 -1 z" />
            </g>
          </g>
        </g>

        <!-- Avatar (drawn last so it sits on top) -->
        <g id="avatar" class="avatar">
          <ellipse class="avatar-shadow" cx="0" cy="40" rx="22" ry="5" />
          <circle class="avatar-ring" cx="0" cy="0" r="40" />
          <image
            id="avatar-image"
            href="assets/lucy2.png"
            x="-38" y="-38" width="76" height="76"
            clip-path="url(#avatar-clip)"
            preserveAspectRatio="xMidYMid slice"
          />
          <text id="avatar-fallback" x="0" y="2" text-anchor="middle" dominant-baseline="central" font-size="44" style="display: none;">🦄</text>
        </g>
      </svg>

      <!-- Confetti overlay -->
      <div id="confetti" class="confetti" aria-hidden="true"></div>
    </section>

    <!-- Week strip: Mon–Sun status -->
    <section class="weekstrip" id="weekstrip" aria-label="Week progress">
      <!-- JS populates 7 day cells -->
    </section>

    <!-- Stats trio -->
    <section class="stats">
      <div class="stat">
        <span class="stat-num" id="stat-week">0<span class="stat-denom">/7</span></span>
        <span class="stat-lbl">This week</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-streak">0</span>
        <span class="stat-lbl">Streak <em>wk</em></span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-stars">0</span>
        <span class="stat-lbl">Total stars</span>
      </div>
    </section>

    <!-- Primary action -->
    <div class="buttons">
      <button id="done-btn" class="btn btn-primary" type="button">
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
        </span>
        <span class="btn-label">Mark today's chore done</span>
      </button>
      <button id="reset-btn" class="btn btn-ghost" type="button">Reset week</button>
    </div>

    <p class="footnote" id="footnote">Tap once a day — every checkpoint moves Lucy along the rainbow.</p>
  </main>

  <!-- React + Babel for Tweaks panel only -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Core app -->
  <script src="app-v2.js"></script>

  <!-- Tweaks -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tweaks-app.jsx"></script>
</body>
</html>
